<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Optics · Topic 3 · Diffraction & Polarisation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<style>
  :root {
    --bg: #0c0f0a;
    --bg2: #131710;
    --bg3: #1a1f16;
    --card: #161b12;
    --border: #2a3324;
    --border2: #3a4a30;
    --accent: #7ec850;
    --accent2: #a8e66e;
    --gold: #d4a843;
    --amber: #e8c46a;
    --red: #e05555;
    --blue: #5ba3d4;
    --muted: #6a7a5a;
    --text: #d8e8c8;
    --text2: #a8b898;
    --text3: #6a7a5a;
    --tag-bg: #1e2a18;
    --correct: #2d5a1a;
    --correct-border: #7ec850;
    --wrong: #5a1a1a;
    --wrong-border: #e05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(126,200,80,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,200,80,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,15,10,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .chapter-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(126,200,80,0.1);
    border: 1px solid rgba(126,200,80,0.3);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }

  .header-title span {
    color: var(--accent);
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* ─── LAYOUT ─── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 64px);
    position: relative;
    z-index: 1;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    background: var(--bg2);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .sidebar-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 0 0.5rem;
    margin-bottom: 0.75rem;
    margin-top: 1.25rem;
  }

  .sidebar-section-title:first-child { margin-top: 0; }

  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.25rem;
  }

  .filter-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: rgba(126,200,80,0.15); border-color: var(--accent); color: var(--accent); }

  .q-nav-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    margin-bottom: 0.3rem;
  }

  .q-nav-item:hover {
    background: var(--bg3);
    border-color: var(--border);
  }

  .q-nav-item.active {
    background: rgba(126,200,80,0.08);
    border-color: rgba(126,200,80,0.3);
  }

  .q-nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 24px;
    font-weight: 600;
  }

  .q-nav-text {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .q-nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .q-nav-dot.correct { background: var(--accent); }
  .q-nav-dot.wrong { background: var(--red); }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 1.25rem;
  }

  .progress-bar-outer {
    height: 4px;
    background: var(--bg3);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 0.5rem;
  }

  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ─── MAIN CONTENT ─── */
  .main {
    padding: 2rem 2.5rem;
    max-width: 900px;
  }

  /* Question Card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 2rem;
    overflow: hidden;
    transition: border-color 0.3s;
    display: none;
  }

  .q-card.visible { display: block; }
  .q-card:hover { border-color: var(--border2); }

  .q-card-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.5rem 1.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(126,200,80,0.04) 0%, transparent 60%);
  }

  .q-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--bg);
    background: var(--accent);
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-meta {
    flex: 1;
  }

  .q-tags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .tag-year { background: rgba(212,168,67,0.15); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }
  .tag-type { background: rgba(91,163,212,0.12); color: var(--blue); border: 1px solid rgba(91,163,212,0.25); }
  .tag-marks { background: rgba(126,200,80,0.1); color: var(--accent); border: 1px solid rgba(126,200,80,0.25); }
  .tag-adv { background: rgba(224,85,85,0.12); color: var(--red); border: 1px solid rgba(224,85,85,0.25); }

  .q-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  /* Diagram */
  .q-diagram {
    margin: 1rem 1.75rem 0;
    padding: 1rem;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .q-diagram svg {
    max-width: 100%;
  }

  /* Options */
  .q-options {
    padding: 1.25rem 1.75rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.85rem 1.1rem;
    border: 1px solid var(--border2);
    border-radius: 10px;
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    color: var(--text2);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(126,200,80,0.06);
    color: var(--text);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn.correct-ans {
    background: rgba(126,200,80,0.12);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .option-btn.wrong-ans {
    background: rgba(224,85,85,0.1);
    border-color: var(--red);
    color: #e08080;
  }

  .opt-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 1px;
    width: 16px;
  }

  .option-btn.wrong-ans .opt-label { color: var(--red); }
  .option-btn.correct-ans .opt-label { color: var(--accent); }

  /* Actions */
  .q-actions {
    display: flex;
    gap: 0.75rem;
    padding: 0 1.75rem 1.5rem;
  }

  .btn-check {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: rgba(126,200,80,0.1);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }

  .btn-check:hover { background: rgba(126,200,80,0.2); }
  .btn-check:disabled { opacity: 0.4; cursor: default; }

  .btn-explain {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-explain:hover { border-color: var(--gold); color: var(--gold); }

  .btn-reset {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .btn-reset:hover { border-color: var(--border2); color: var(--text2); }

  /* Explanation */
  .explanation-panel {
    margin: 0 1.75rem 1.5rem;
    padding: 1.25rem;
    background: linear-gradient(135deg, rgba(212,168,67,0.07) 0%, rgba(12,15,10,0.5) 100%);
    border: 1px solid rgba(212,168,67,0.25);
    border-left: 3px solid var(--gold);
    border-radius: 10px;
    display: none;
  }

  .explanation-panel.visible { display: block; }

  .explain-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .explain-title::before {
    content: '◆';
    font-size: 8px;
  }

  .explain-text {
    font-size: 14px;
    line-height: 1.85;
    color: var(--text2);
  }

  .explain-text strong {
    color: var(--amber);
  }

  /* Result badge */
  .result-badge {
    display: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 20px;
    align-self: center;
  }

  .result-badge.correct { display: inline; background: rgba(126,200,80,0.15); color: var(--accent); border: 1px solid rgba(126,200,80,0.4); }
  .result-badge.wrong { display: inline; background: rgba(224,85,85,0.15); color: var(--red); border: 1px solid rgba(224,85,85,0.4); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 1000;
    padding: 0.85rem 1.5rem;
    border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
    letter-spacing: 0.5px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.correct { background: rgba(126,200,80,0.9); color: #0c0f0a; }
  .toast.wrong { background: rgba(224,85,85,0.9); color: white; }

  /* Page title area */
  .page-hero {
    padding: 0 0 2rem 0;
    position: relative;
  }

  .page-hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
  }

  .page-hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }

  .page-hero-title .highlight {
    color: var(--accent);
  }

  .page-hero-sub {
    font-size: 13px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .hero-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    margin: 1rem 0;
  }

  /* Diagram SVG styles */
  .diag-line { stroke: var(--accent); stroke-width: 1.5; fill: none; }
  .diag-wave { stroke: var(--gold); stroke-width: 1.5; fill: none; }
  .diag-dashed { stroke: var(--muted); stroke-width: 1; fill: none; stroke-dasharray: 4,3; }
  .diag-arrow { stroke: var(--accent2); stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
  .diag-text { fill: var(--text2); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .diag-text-accent { fill: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .diag-text-gold { fill: var(--gold); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .diag-fill { fill: rgba(126,200,80,0.08); stroke: var(--accent); stroke-width: 1; }
  .diag-pol { fill: rgba(91,163,212,0.12); stroke: var(--blue); stroke-width: 1.5; }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--bg);
    background: var(--gold);
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
  }

  .section-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Numeric answer special */
  .numeric-input-wrap {
    padding: 0.5rem 1.75rem;
  }

  .numeric-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 10px 16px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    width: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  .numeric-input:focus { border-color: var(--accent); }
  .numeric-input.correct-input { border-color: var(--accent); color: var(--accent); }
  .numeric-input.wrong-input { border-color: var(--red); color: var(--red); }

  /* Single option grid override */
  .q-options.single-col { grid-template-columns: 1fr; }

  mjx-container { color: var(--text); }

  .empty-state {
    padding: 3rem;
    text-align: center;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.5px;
    display: none;
  }

  .empty-state.visible { display: block; }

</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <span class="chapter-badge">Ch. 24</span>
    <h1 class="header-title">Wave Optics · <span>Topic 3</span></h1>
  </div>
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="stat-attempted">0</span>
      <span class="stat-label">Attempted</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="stat-correct">0</span>
      <span class="stat-label">Correct</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num" id="stat-score">0%</span>
      <span class="stat-label">Score</span>
    </div>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-title">Filter</div>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('unattempted')">Unattempted</button>
      <button class="filter-btn" onclick="setFilter('correct')">Correct</button>
      <button class="filter-btn" onclick="setFilter('wrong')">Wrong</button>
    </div>

    <div class="sidebar-section-title">Progress</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Completion</span>
        <span id="prog-label">0 / 29</span>
      </div>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
    </div>

    <div class="sidebar-section-title">Questions</div>
    <div id="q-nav-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-hero">
      <p class="page-hero-eyebrow">JEE Advanced & Main · 1982–2020</p>
      <h2 class="page-hero-title"><span class="highlight">Diffraction,</span> Polarisation<br>& Resolving Power</h2>
      <div class="hero-divider"></div>
      <p class="page-hero-sub">29 questions · MCQ · Integer · Numeric</p>
    </div>

    <div class="empty-state" id="empty-state">No questions match this filter.</div>

    <!-- Questions will be injected here -->
    <div id="questions-container"></div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const questions = [
  {
    id: 1,
    year: "Main Sep. 2020 (I)",
    type: "MCQ",
    marks: "4",
    text: "A beam of plane polarised light of large cross-sectional area and uniform intensity of 3.3 Wm⁻² falls normally on a polariser (cross sectional area 3×10⁻⁴ m²) which rotates about its axis with an angular speed of 31.4 rad/s. The energy of light passing through the polariser per revolution is close to:",
    diagram: `<svg width="300" height="130" viewBox="0 0 300 130">
      <defs><marker id="a1" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#a8e66e"/></marker></defs>
      <rect x="20" y="30" width="80" height="70" rx="4" class="diag-pol" opacity="0.6"/>
      <text x="60" y="70" class="diag-text" text-anchor="middle">Unpolarised</text>
      <text x="60" y="85" class="diag-text" text-anchor="middle">I₀ = 3.3 Wm⁻²</text>

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  selected: {},    // qId → option index
  revealed: {},    // qId → bool (explanation shown)
  checked: {},     // qId → bool
  filter: 'all'
};

let attempted = 0, correctCount = 0;

// ─── RENDER ──────────────────────────────────────────────────────────────────
function renderAll() {
  renderQuestions();
  renderNav();
  updateStats();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  const visible = questions.filter(q => matchesFilter(q));
  const empty = document.getElementById('empty-state');
  empty.classList.toggle('visible', visible.length === 0);

  questions.forEach(q => {
    const card = buildCard(q);
    card.classList.toggle('visible', matchesFilter(q));
    container.appendChild(card);
  });

  if (window.MathJax) MathJax.typesetPromise();
}

function matchesFilter(q) {
  const f = state.filter;
  if (f === 'all') return true;
  if (f === 'unattempted') return !state.checked[q.id];
  if (f === 'correct') return state.checked[q.id] && isCorrect(q);
  if (f === 'wrong') return state.checked[q.id] && !isCorrect(q);
  return true;
}

function isCorrect(q) {
  if (q.isNumeric) return false; // handled separately
  return state.selected[q.id] === q.correct;
}

function buildCard(q) {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `qcard-${q.id}`;

  const checked = state.checked[q.id];
  const selected = state.selected[q.id];
  const correct = q.correct;
  const explVisible = state.revealed[q.id];

  const typeTag = q.isNumeric ? 'Numeric' : (q.type || 'MCQ');
  const yearTag = q.year || '';

  card.innerHTML = `
    <div class="q-card-header">
      <div class="q-number">${q.id}</div>
      <div class="q-meta">
        <div class="q-tags">
          <span class="tag tag-year">${yearTag}</span>
          <span class="tag tag-type">${typeTag}</span>
          <span class="tag tag-marks">${q.marks} Marks</span>
        </div>
        <p class="q-text">${q.text}</p>
      </div>
      ${checked ? `<span class="result-badge ${isCorrect(q) || (q.isNumeric && state.numericCorrect && state.numericCorrect[q.id]) ? 'correct' : 'wrong'}">${(isCorrect(q) || (q.isNumeric && state.numericCorrect && state.numericCorrect[q.id])) ? '✓ Correct' : '✗ Wrong'}</span>` : ''}
    </div>
    ${q.diagram ? `<div class="q-diagram">${q.diagram}</div>` : ''}
    ${q.isNumeric ? buildNumericInput(q, checked) : buildOptions(q, checked, selected, correct)}
    <div class="q-actions">
      <button class="btn-check" id="btn-check-${q.id}" onclick="checkAnswer(${q.id})" ${checked ? 'disabled' : ''}>Check</button>
      <button class="btn-explain" onclick="toggleExplain(${q.id})">
        ${explVisible ? 'Hide' : 'Show'} Solution
      </button>
      <button class="btn-reset" onclick="resetQuestion(${q.id})">Reset</button>
    </div>
    <div class="explanation-panel ${explVisible ? 'visible' : ''}" id="explain-${q.id}">
      <div class="explain-title">Detailed Solution</div>
      <div class="explain-text">${q.explanation}</div>
    </div>
  `;

  return card;
}

function buildOptions(q, checked, selected, correct) {
  const labels = ['a', 'b', 'c', 'd'];
  let html = `<div class="q-options">`;
  q.options.forEach((opt, i) => {
    let cls = '';
    if (checked) {
      if (i === correct) cls = 'correct-ans';
      else if (i === selected && i !== correct) cls = 'wrong-ans';
    } else if (selected === i) {
      cls = 'selected';
    }
    html += `
      <button class="option-btn ${cls}" 
        id="opt-${q.id}-${i}"
        onclick="selectOption(${q.id}, ${i})"
        ${checked ? 'disabled' : ''}>
        <span class="opt-label">${labels[i]}</span>
        <span>${opt}</span>
      </button>`;
  });
  html += `</div>`;
  return html;
}

function buildNumericInput(q, checked) {
  const inputCls = checked ? (state.numericCorrect && state.numericCorrect[q.id] ? 'correct-input' : 'wrong-input') : '';
  return `
    <div class="numeric-input-wrap">
      <input type="number" class="numeric-input ${inputCls}" 
        id="numeric-${q.id}"
        placeholder="Enter your answer"
        value="${state.numericAnswers ? (state.numericAnswers[q.id] || '') : ''}"
        ${checked ? 'disabled' : ''}
        oninput="storeNumeric(${q.id}, this.value)"/>
    </div>`;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectOption(qId, idx) {
  if (state.checked[qId]) return;
  state.selected[qId] = idx;
  // Update button styles without full re-render
  const q = questions.find(x => x.id === qId);
  const labels = ['a', 'b', 'c', 'd'];
  q.options.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qId}-${i}`);
    if (btn) {
      btn.className = `option-btn${i === idx ? ' selected-pre' : ''}`;
      if (i === idx) btn.style.borderColor = 'var(--accent)';
      else btn.style.borderColor = '';
    }
  });
}

function storeNumeric(qId, val) {
  if (!state.numericAnswers) state.numericAnswers = {};
  state.numericAnswers[qId] = val;
}

function checkAnswer(qId) {
  const q = questions.find(x => x.id === qId);
  if (!q) return;

  if (q.isNumeric) {
    const inputEl = document.getElementById(`numeric-${qId}`);
    const userVal = parseFloat(inputEl ? inputEl.value : '');
    if (!state.numericAnswers) state.numericAnswers = {};
    if (!state.numericCorrect) state.numericCorrect = {};
    const isRight = Math.abs(userVal - q.correctAnswer) < 0.5;
    state.numericCorrect[qId] = isRight;
    state.checked[qId] = true;
    if (!state.wasAttempted) state.wasAttempted = {};
    if (!state.wasAttempted[qId]) {
      state.wasAttempted[qId] = true;
      attempted++;
      if (isRight) correctCount++;
    }
    showToast(isRight ? `✓ Correct! Answer: ${q.correctAnswer}` : `✗ Wrong. Answer: ${q.correctAnswer}`, isRight);
  } else {
    if (state.selected[qId] === undefined) return;
    state.checked[qId] = true;
    if (!state.wasAttempted) state.wasAttempted = {};
    if (!state.wasAttempted[qId]) {
      state.wasAttempted[qId] = true;
      attempted++;
      if (state.selected[qId] === q.correct) correctCount++;
    }
    const correct = state.selected[qId] === q.correct;
    showToast(correct ? '✓ Correct!' : `✗ Wrong. Answer: (${['a','b','c','d'][q.correct]}) ${q.options[q.correct]}`, correct);
  }

  updateStats();
  // Re-render this card
  const oldCard = document.getElementById(`qcard-${qId}`);
  if (oldCard) {
    const newCard = buildCard(q);
    newCard.className = oldCard.className;
    oldCard.replaceWith(newCard);
    if (window.MathJax) MathJax.typesetPromise();
  }
  renderNav();
}

function toggleExplain(qId) {
  state.revealed[qId] = !state.revealed[qId];
  const panel = document.getElementById(`explain-${qId}`);
  const btn = document.querySelector(`#qcard-${qId} .btn-explain`);
  if (panel) panel.classList.toggle('visible', state.revealed[qId]);
  if (btn) btn.textContent = (state.revealed[qId] ? 'Hide' : 'Show') + ' Solution';
}

function resetQuestion(qId) {
  delete state.selected[qId];
  delete state.checked[qId];
  delete state.revealed[qId];
  if (state.numericAnswers) delete state.numericAnswers[qId];
  if (state.numericCorrect) delete state.numericCorrect[qId];
  if (state.wasAttempted && state.wasAttempted[qId]) {
    delete state.wasAttempted[qId];
    // Recalculate stats
    attempted = Object.keys(state.checked).length + (Object.keys(state.numericCorrect || {}).length);
    correctCount = 0;
    questions.forEach(q => {
      if (q.isNumeric && state.numericCorrect && state.numericCorrect[q.id]) correctCount++;
      else if (!q.isNumeric && state.checked[q.id] && state.selected[q.id] === q.correct) correctCount++;
    });
  }
  updateStats();
  const oldCard = document.getElementById(`qcard-${qId}`);
  const q = questions.find(x => x.id === qId);
  if (oldCard && q) {
    const newCard = buildCard(q);
    newCard.className = oldCard.className;
    oldCard.replaceWith(newCard);
    if (window.MathJax) MathJax.typesetPromise();
  }
  renderNav();
}

function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderQuestions();
  renderNav();
}

function updateStats() {
  document.getElementById('stat-attempted').textContent = attempted;
  document.getElementById('stat-correct').textContent = correctCount;
  const pct = attempted > 0 ? Math.round(correctCount / attempted * 100) : 0;
  document.getElementById('stat-score').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `${attempted} / ${questions.length}`;
  document.getElementById('progress-bar').style.width = `${(attempted / questions.length) * 100}%`;
}

function renderNav() {
  const list = document.getElementById('q-nav-list');
  list.innerHTML = '';
  questions.forEach(q => {
    const item = document.createElement('div');
    item.className = 'q-nav-item';
    item.onclick = () => {
      document.getElementById(`qcard-${q.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    };

    let dotClass = '';
    if (state.checked[q.id]) {
      dotClass = isCorrect(q) || (state.numericCorrect && state.numericCorrect[q.id]) ? 'correct' : 'wrong';
    }

    const snippet = q.text.replace(/<[^>]+>/g, '').substring(0, 35) + '...';
    item.innerHTML = `
      <span class="q-nav-num">Q${q.id}</span>
      <span class="q-nav-text">${snippet}</span>
      <span class="q-nav-dot ${dotClass}"></span>
    `;
    list.appendChild(item);
  });
}

function showToast(msg, correct) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${correct ? 'correct' : 'wrong'}`;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderAll();
</script>

</html>
