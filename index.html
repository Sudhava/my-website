<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Optics — JEE Question Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=JetBrains+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>
<style>
:root {
  --bg: #0b0e14;
  --card: #111520;
  --border: #1e2535;
  --accent: #38bdf8;
  --gold: #f59e0b;
  --green: #34d399;
  --red: #f87171;
  --text: #c9d4e8;
  --muted: #4a5568;
  --white: #e8f0ff;
  --topic1: #818cf8;
  --topic2: #38bdf8;
  --topic3: #f472b6;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
}

/* Sidebar */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 280px;
  background: #080b10;
  border-right: 1px solid var(--border);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--white);
  line-height: 1.3;
}

.sidebar-logo span { color: var(--accent); font-style: italic; }

.sidebar-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 6px;
}

.topic-nav { padding: 16px 12px; flex: 1; }

.topic-section { margin-bottom: 8px; }

.topic-btn {
  width: 100%;
  padding: 10px 12px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.topic-btn:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.topic-btn.active { background: rgba(56,189,248,0.08); color: var(--accent); border-left: 2px solid var(--accent); }

.topic-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.q-count {
  margin-left: auto;
  background: rgba(255,255,255,0.06);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 9px;
}

/* Stats bar */
.stats-bar {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 16px;
}

.stat { text-align: center; flex: 1; }
.stat-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--white); }
.stat-label { font-size: 9px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

/* Main content */
.main {
  margin-left: 280px;
  flex: 1;
  padding: 0;
}

/* Header */
.main-header {
  background: rgba(8,11,16,0.95);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.topic-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  color: var(--white);
  flex: 1;
}

.filter-btns { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-btn {
  padding: 6px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.08); }

.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); white-space: nowrap; }
.progress-bar { width: 100px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.4s ease; }

/* Questions container */
.questions-container {
  padding: 28px 32px;
  max-width: 900px;
}

/* Question card */
.q-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 20px;
  overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeSlideIn 0.4s ease;
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-card:hover { border-color: #2a3555; }
.q-card.answered-correct { border-color: rgba(52,211,153,0.3); }
.q-card.answered-wrong { border-color: rgba(248,113,113,0.2); }

.q-header {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.01);
}

.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  flex-shrink: 0;
}

.q-tags { display: flex; gap: 6px; flex-wrap: wrap; }

.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 3px;
}

.tag-year { background: rgba(245,158,11,0.12); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
.tag-type { background: rgba(56,189,248,0.1); color: var(--accent); border: 1px solid rgba(56,189,248,0.2); }
.tag-marks { background: rgba(52,211,153,0.08); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }

.q-status { margin-left: auto; font-size: 14px; }

.q-body { padding: 20px; }

.q-text {
  font-size: 0.95rem;
  line-height: 1.85;
  color: var(--text);
  margin-bottom: 16px;
}

/* SVG Diagrams */
.diagram-wrap {
  background: #0a0f1a;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  margin: 14px 0;
  text-align: center;
}

.diagram-caption {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Options */
.options { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 11px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(255,255,255,0.01);
}

.option:hover { border-color: #2a3555; background: rgba(255,255,255,0.03); }

.option.selected { border-color: var(--accent); background: rgba(56,189,248,0.06); }
.option.correct { border-color: var(--green); background: rgba(52,211,153,0.08); }
.option.wrong { border-color: var(--red); background: rgba(248,113,113,0.06); }
.option.show-correct { border-color: var(--green); background: rgba(52,211,153,0.08); }

.option-letter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 20px;
  padding-top: 1px;
  flex-shrink: 0;
}

.option.selected .option-letter { color: var(--accent); }
.option.correct .option-letter, .option.show-correct .option-letter { color: var(--green); }
.option.wrong .option-letter { color: var(--red); }

.option-text { font-size: 0.9rem; line-height: 1.6; flex: 1; }

/* Action buttons */
.q-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

.btn {
  padding: 8px 18px;
  border-radius: 5px;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-check {
  background: var(--accent);
  color: #000;
}

.btn-check:hover { background: #7dd3fc; }
.btn-check:disabled { background: var(--border); color: var(--muted); cursor: default; }

.btn-reveal {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}

.btn-reveal:hover { border-color: var(--gold); color: var(--gold); }

.btn-reset {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}

.btn-reset:hover { border-color: var(--red); color: var(--red); }

/* Answer panel */
.answer-panel {
  display: none;
  margin-top: 16px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.answer-panel.visible { display: block; }

.ans-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.ans-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 3px;
}

.ans-badge-correct { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.ans-badge-wrong { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
.ans-badge-answer { background: rgba(245,158,11,0.12); color: var(--gold); border: 1px solid rgba(245,158,11,0.25); }

.ans-correct-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--green);
}

.explanation {
  background: #0d1220;
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  border-radius: 4px;
  padding: 16px;
  margin-top: 10px;
}

.exp-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}

.exp-text {
  font-size: 0.875rem;
  line-height: 1.9;
  color: #9badc5;
}

.exp-text .math-step {
  background: rgba(56,189,248,0.06);
  border-radius: 4px;
  padding: 8px 12px;
  margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent);
}

/* Topic panels */
.topic-panel { display: none; }
.topic-panel.active { display: block; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-size: 0.9rem;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { width: 100%; position: relative; height: auto; }
  .layout { flex-direction: column; }
  .main { margin-left: 0; }
  .questions-container { padding: 16px; }
  .main-header { padding: 12px 16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Score feedback */
.score-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--white);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 200;
}

.score-toast.show { transform: translateY(0); opacity: 1; }
.score-toast .score-val { font-size: 1.4rem; color: var(--green); font-family: 'Playfair Display', serif; display: block; margin-bottom: 2px; }

/* Keyboard shortcut hint */
.shortcut-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: 1px;
}

kbd {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 9px;
}
</style>
</head>
<body>

<div class="layout">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">Wave <span>Optics</span><br>Question Bank</div>
    <div class="sidebar-subtitle">JEE Mains &amp; Advanced</div>
  </div>

  <nav class="topic-nav">
    <div class="topic-section">
      <button class="topic-btn active" onclick="showTopic('t1')" id="btn-t1">
        <span class="topic-dot" style="background:#818cf8"></span>
        Topic 1: Wavefront &amp; Interference
        <span class="q-count">13</span>
      </button>
    </div>
    <div class="topic-section">
      <button class="topic-btn" onclick="showTopic('t2')" id="btn-t2">
        <span class="topic-dot" style="background:#38bdf8"></span>
        Topic 2: Young's Double Slit
        <span class="q-count">29</span>
      </button>
    </div>
    <div class="topic-section">
      <button class="topic-btn" onclick="showTopic('t3')" id="btn-t3">
        <span class="topic-dot" style="background:#f472b6"></span>
        Topic 3: Diffraction &amp; Polarisation
        <span class="q-count">10</span>
      </button>
    </div>
  </nav>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="stat-answered">0</div>
      <div class="stat-label">Attempted</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-correct" style="color:var(--green)">0</div>
      <div class="stat-label">Correct</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-pct" style="color:var(--accent)">0%</div>
      <div class="stat-label">Score</div>
    </div>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="main-header">
    <div class="topic-title" id="topic-title">Topic 1: Wavefront, Interference &amp; Coherence</div>
    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('unattempted', this)">Unattempted</button>
      <button class="filter-btn" onclick="setFilter('correct', this)">✓ Correct</button>
      <button class="filter-btn" onclick="setFilter('wrong', this)">✗ Wrong</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-text" id="progress-text">0 / 0</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Topic 1 Panel -->
  <div class="topic-panel active" id="panel-t1">
    <div class="questions-container" id="qc-t1"></div>
  </div>

  <!-- Topic 2 Panel -->
  <div class="topic-panel" id="panel-t2">
    <div class="questions-container" id="qc-t2"></div>
  </div>

  <!-- Topic 3 Panel -->
  <div class="topic-panel" id="panel-t3">
    <div class="questions-container" id="qc-t3"></div>
  </div>
</main>
</div>

<div class="score-toast" id="toast">
  <span class="score-val" id="toast-val"></span>
  <span id="toast-msg"></span>
</div>

<script>
// ================================================
// QUESTION DATA
// ================================================
const QUESTIONS = {
  t1: [
    {
      id: 1, year: "Main Sep 2020 (I)", type: "MCQ", marks: "4",
      text: "In the figure below, P and Q are two equally intense coherent sources emitting radiation of wavelength 20 m. The separation between P and Q is 5 m and the phase of P is ahead of that of Q by 90°. A, B and C are three distinct points of observation, each equidistant from the midpoint of PQ. The intensities of radiation at A, B, C will be in the ratio:",
      diagram: `<svg width="280" height="160" viewBox="0 0 280 160" style="font-family:JetBrains Mono,monospace">
        <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0L6,3L0,6Z" fill="#4a5568"/></marker></defs>
        <line x1="140" y1="20" x2="140" y2="140" stroke="#1e2535" stroke-width="1"/>
        <line x1="40" y1="80" x2="240" y2="80" stroke="#1e2535" stroke-width="1"/>
        <!-- B top -->
        <circle cx="140" cy="30" r="5" fill="#818cf8"/>
        <text x="150" y="34" fill="#818cf8" font-size="11">B</text>
        <!-- P Q sources -->
        <circle cx="120" cy="80" r="5" fill="#38bdf8"/>
        <text x="106" y="76" fill="#38bdf8" font-size="11">P</text>
        <circle cx="160" cy="80" r="5" fill="#38bdf8"/>
        <text x="163" y="76" fill="#38bdf8" font-size="11">Q</text>
        <!-- A right -->
        <circle cx="230" cy="80" r="5" fill="#f472b6"/>
        <text x="234" y="84" fill="#f472b6" font-size="11">A</text>
        <!-- C bottom -->
        <circle cx="140" cy="130" r="5" fill="#34d399"/>
        <text x="150" y="134" fill="#34d399" font-size="11">C</text>
        <!-- d label -->
        <line x1="120" y1="92" x2="160" y2="92" stroke="#4a5568" stroke-width="1" marker-end="url(#arr)"/>
        <text x="130" y="105" fill="#4a5568" font-size="9">d=5m</text>
      </svg>`,
      options: ["0:1:4", "2:1:0", "0:1:2", "4:1:0"],
      answer: 1,
      explanation: `At A (on the perpendicular bisector on PQ extended): Path difference = x_P − x_Q = (d+2.5)−(d−2.5) = 5 m. Phase due to path diff = (2π/20)×5 = π/2. But P is ahead of Q by π/2. Total phase at A = π/2 − π/2 = 0 → I_A = 4I.
At C (symmetric, below): Phase from path diff = π/2, initial phase = π/2 → total = π → I_C = 0.
At B (above, on axis): Path diff = 0, initial phase = π/2 → I_B = 2I.
Ratio I_A : I_B : I_C = 4I : 2I : 0 = 2:1:0.`
    },
    {
      id: 2, year: "Main Sep 2020 (II)", type: "MCQ", marks: "4",
      text: "Two coherent sources of sound S₁ and S₂ produce sound waves of the same wavelength λ = 1 m, in phase. S₁ and S₂ are placed 1.5 m apart. A listener, located at L, directly in front of S₂ finds that the intensity is at a minimum when he is 2 m away from S₂. The listener moves away from S₁, keeping his distance from S₂ fixed. The adjacent maximum of intensity is observed when the listener is at a distance d from S₁. Then d is:",
      diagram: `<svg width="280" height="170" viewBox="0 0 280 170" style="font-family:JetBrains Mono,monospace">
        <circle cx="70" cy="130" r="6" fill="#38bdf8"/><text x="76" y="134" fill="#38bdf8" font-size="11">S₂</text>
        <circle cx="70" cy="50" r="6" fill="#818cf8"/><text x="76" y="54" fill="#818cf8" font-size="11">S₁</text>
        <line x1="70" y1="50" x2="70" y2="130" stroke="#1e2535" stroke-width="1.5"/>
        <text x="74" y="96" fill="#4a5568" font-size="10">1.5m</text>
        <circle cx="200" cy="130" r="6" fill="#f59e0b"/><text x="208" y="134" fill="#f59e0b" font-size="11">L</text>
        <line x1="70" y1="130" x2="200" y2="130" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="118" y="148" fill="#34d399" font-size="10">2m (S₂L)</text>
        <line x1="70" y1="50" x2="200" y2="130" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="100" y="75" fill="#f472b6" font-size="10">S₁L = 2.5m</text>
        <text x="150" y="110" fill="#38bdf8" font-size="9">d = ?</text>
      </svg>`,
      options: ["12 m", "5 m", "2 m", "3 m"],
      answer: 3,
      explanation: `Initially S₁L = √(2²+1.5²) = 2.5 m, S₂L = 2 m. Path diff = 0.5 m = λ/2 → minimum ✓. For next maximum moving away, path diff must be λ = 1 m. S₁L' − S₂L = 1, so S₁L' = 3 m. Therefore d = 3 m.`
    },
    {
      id: 3, year: "Main Sep 2020 (II)", type: "MCQ", marks: "4",
      text: "Two light waves having the same wavelength λ in vacuum are in phase initially. Then the first wave travels a path L₁ through a medium of refractive index n₁ while the second wave travels a path of length L₂ through a medium of refractive index n₂. After this the phase difference between the two waves is:",
      options: ["(2π/λ)(L₂/n₁ − L₁/n₂)", "(2π/λ)(L₁/n₁ − L₂/n₂)", "(2π/λ)(n₁L₁ − n₂L₂)", "(2π/λ)(n₂L₁ − n₁L₂)"],
      answer: 2,
      explanation: `Optical path for wave 1 = n₁L₁, for wave 2 = n₂L₂. Path difference = n₁L₁ − n₂L₂. Phase difference = (2π/λ) × path difference = (2π/λ)(n₁L₁ − n₂L₂).`
    },
    {
      id: 4, year: "Adv 2020", type: "MCQ", marks: "4",
      text: "A parallel beam of light strikes a piece of transparent glass having cross section as shown in the figure below. Correct shape of the emergent wavefront will be (figures are schematic and not drawn to scale). The glass cross-section has a convex surface in the middle and flat surfaces top and bottom.",
      diagram: `<svg width="280" height="140" viewBox="0 0 280 140" style="font-family:JetBrains Mono,monospace">

// ================================================
let currentTopic = 't1';
let currentFilter = 'all';
const state = {}; // {qId: {selected: index, revealed: bool, correct: bool}}
const allQIds = new Set();

// Assign unique ids
Object.entries(QUESTIONS).forEach(([topic, qs]) => {
  qs.forEach(q => allQIds.add(`${topic}-${q.id}`));
});

// ================================================
// RENDER
// ================================================
function renderQuestions(topicKey) {
  const container = document.getElementById(`qc-${topicKey}`);
  const qs = QUESTIONS[topicKey];
  container.innerHTML = '';

  const filtered = qs.filter(q => {
    const key = `${topicKey}-${q.id}`;
    const s = state[key];
    if (currentFilter === 'all') return true;
    if (currentFilter === 'unattempted') return !s || s.selected === undefined;
    if (currentFilter === 'correct') return s && s.correct === true;
    if (currentFilter === 'wrong') return s && s.correct === false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">No questions match this filter.</div>';
    return;
  }

  filtered.forEach((q, idx) => {
    const key = `${topicKey}-${q.id}`;
    const s = state[key] || {};
    const card = document.createElement('div');
    card.className = 'q-card' + (s.correct === true ? ' answered-correct' : s.correct === false ? ' answered-wrong' : '');
    card.id = `card-${key}`;

    const statusIcon = s.correct === true ? '✓' : s.correct === false ? '✗' : '';
    const statusColor = s.correct === true ? 'var(--green)' : 'var(--red)';

    let optionsHTML = '';
    if (!q.isInteger) {
      const letters = ['(a)', '(b)', '(c)', '(d)'];
      q.options.forEach((opt, oi) => {
        let cls = 'option';
        if (s.selected !== undefined) {
          if (oi === s.selected) cls += s.correct ? ' correct' : ' wrong';
          // Show correct answer if wrong
          const correctIdx = typeof q.answer === 'number' ? q.answer : -1;
          if (!s.correct && oi === correctIdx) cls += ' show-correct';
        }
        optionsHTML += `<div class="${cls}" onclick="selectOption('${key}', ${oi})">
          <span class="option-letter">${letters[oi]}</span>
          <span class="option-text">${opt}</span>
        </div>`;
      });
    } else {
      optionsHTML = `<div style="background:#0d1220;border:1px solid var(--border);border-radius:6px;padding:14px;margin:10px 0;display:flex;align-items:center;gap:12px">
        <span style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px">Integer Answer:</span>
        <span style="font-family:JetBrains Mono,monospace;color:var(--gold);font-size:1.1rem">${q.intAnswer}</span>
      </div>`;
    }

    const answerVisible = s.revealed ? 'visible' : '';
    const ansBadge = s.correct === true
      ? `<span class="ans-badge ans-badge-correct">✓ Correct</span>`
      : s.correct === false
      ? `<span class="ans-badge ans-badge-wrong">✗ Incorrect</span><span class="ans-badge ans-badge-answer">Correct: (${['a','b','c','d'][q.answer]})</span>`
      : `<span class="ans-badge ans-badge-answer">Answer: (${typeof q.answer === 'number' ? ['a','b','c','d'][q.answer] : q.answer})</span>`;

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${idx + 1}</span>
        <div class="q-tags">
          <span class="tag tag-year">${q.year}</span>
          <span class="tag tag-type">${q.type}</span>
          <span class="tag tag-marks">[${q.marks} marks]</span>
        </div>
        <span class="q-status" style="color:${statusColor}">${statusIcon}</span>
      </div>
      <div class="q-body">
        <div class="q-text">${q.text}</div>
        ${q.diagram ? `<div class="diagram-wrap">${q.diagram}<div class="diagram-caption">Figure — Not to scale</div></div>` : ''}
        <div class="options" id="opts-${key}">${optionsHTML}</div>
        <div class="q-actions">
          ${!q.isInteger ? `<button class="btn btn-check" id="chk-${key}" onclick="checkAnswer('${key}')" ${s.selected === undefined ? 'disabled' : ''}>Check</button>` : ''}
          <button class="btn btn-reveal" onclick="toggleExplanation('${key}')">
            ${s.revealed ? 'Hide' : 'Show'} Explanation
          </button>
          ${s.selected !== undefined ? `<button class="btn btn-reset" onclick="resetQ('${key}')">Reset</button>` : ''}
        </div>
        <div class="shortcut-hint">Click an option to select, then Check. Press <kbd>E</kbd> to expand explanation.</div>
        <div class="answer-panel ${answerVisible}" id="ans-${key}">
          <div class="ans-header">${s.revealed || s.selected !== undefined ? ansBadge : `<span class="ans-badge ans-badge-answer">Answer: (${typeof q.answer === 'number' ? ['a','b','c','d'][q.answer] : q.answer})</span>`}</div>
          <div class="explanation">
            <div class="exp-title">Detailed Solution</div>
            <div class="exp-text">${q.explanation.replace(/\n/g,'<br/>')}</div>
          </div>
        </div>
      </div>`;

    container.appendChild(card);
  });

  // Re-render MathJax
  if (window.MathJax) MathJax.typesetPromise([container]);
  updateStats();
}

function selectOption(key, optIdx) {
  if (state[key] && state[key].selected !== undefined) return;
  if (!state[key]) state[key] = {};
  state[key].selected = optIdx;
  const topic = key.split('-')[0];
  renderQuestions(topic);

  // Enable check button
  const chkBtn = document.getElementById(`chk-${key}`);
  if (chkBtn) chkBtn.disabled = false;
}

function checkAnswer(key) {
  if (!state[key] || state[key].selected === undefined) return;
  const topic = key.split('-')[0];
  const qId = parseInt(key.split('-')[1]);
  const q = QUESTIONS[topic].find(x => x.id === qId);
  const isCorrect = state[key].selected === q.answer;
  state[key].correct = isCorrect;
  state[key].revealed = true;
  renderQuestions(topic);
  showToast(isCorrect);
  updateStats();
  updateProgress();
}

function toggleExplanation(key) {
  if (!state[key]) state[key] = {};
  state[key].revealed = !state[key].revealed;
  const panel = document.getElementById(`ans-${key}`);
  if (panel) panel.classList.toggle('visible', state[key].revealed);
  const btn = panel && panel.previousElementSibling.querySelector('.btn-reveal');
}

function resetQ(key) {
  delete state[key];
  const topic = key.split('-')[0];
  renderQuestions(topic);
  updateStats();
  updateProgress();
}

// ================================================
// TOPIC SWITCHING
// ================================================
const TOPIC_TITLES = {
  t1: 'Topic 1: Wavefront, Interference & Coherent Sources',
  t2: "Topic 2: Young's Double Slit Experiment",
  t3: 'Topic 3: Diffraction, Polarisation & Resolving Power'
};

function showTopic(topicKey) {
  currentTopic = topicKey;
  document.querySelectorAll('.topic-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${topicKey}`).classList.add('active');
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${topicKey}`).classList.add('active');
  document.getElementById('topic-title').textContent = TOPIC_TITLES[topicKey];
  renderQuestions(topicKey);
}

// ================================================
// FILTER
// ================================================
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions(currentTopic);
}

// ================================================
// STATS & PROGRESS
// ================================================
function updateStats() {
  let answered = 0, correct = 0;
  Object.values(state).forEach(s => {
    if (s.selected !== undefined) answered++;
    if (s.correct === true) correct++;
  });
  document.getElementById('stat-answered').textContent = answered;
  document.getElementById('stat-correct').textContent = correct;
  const pct = answered > 0 ? Math.round(correct/answered*100) : 0;
  document.getElementById('stat-pct').textContent = pct + '%';
}

function updateProgress() {
  const qs = QUESTIONS[currentTopic];
  const total = qs.length;
  let done = 0;
  qs.forEach(q => {
    const k = `${currentTopic}-${q.id}`;
    if (state[k] && state[k].selected !== undefined) done++;
  });
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done/total)*100}%`;
}

// ================================================
// TOAST
// ================================================
function showToast(correct) {
  const toast = document.getElementById('toast');
  const val = document.getElementById('toast-val');
  const msg = document.getElementById('toast-msg');
  val.textContent = correct ? '✓ Correct!' : '✗ Wrong';
  val.style.color = correct ? 'var(--green)' : 'var(--red)';
  msg.textContent = correct ? 'Great work!' : 'Review the explanation below.';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ================================================
// INIT
// ================================================
renderQuestions('t1');
updateStats();
updateProgress();
</script>
